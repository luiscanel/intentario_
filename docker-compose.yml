services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: inventario-almo-server
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - HOST=0.0.0.0
      - JWT_SECRET=dev-secret-key-min-32-characters-long
      - JWT_EXPIRES_IN=24h
      - DATABASE_URL=file:./prisma/dev.db
      - CORS_ORIGIN=http://localhost:5174,http://localhost:3001,http://client:5174,http://127.0.0.1:5174,http://192.168.0.11:5174,http://192.168.0.11:3001,http://192.168.0.12:5174,http://192.168.0.12:3001
    working_dir: /app
    mem_limit: 512m
    memswap_limit: 768m
    cpus: 0.5
    networks:
      - inventario-net

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: inventario-almo-client
    ports:
      - "5174:5174"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://server:3001
      - NODE_OPTIONS=--max-old-space-size=512
    depends_on:
      - server
    working_dir: /app
    mem_limit: 2g
    memswap_limit: 2.5g
    cpus: 2.0
    networks:
      - inventario-net

networks:
  inventario-net:
    driver: bridge
