version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - HOST=0.0.0.0
      - JWT_SECRET=dev-secret-key-min-32-characters-long
      - JWT_EXPIRES_IN=24h
      - DATABASE_URL=file:./prisma/dev.db
      - CORS_ORIGIN=http://localhost:5174,http://localhost:3001
    working_dir: /app

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "5174:5174"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - server
    working_dir: /app
